<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SATRIA Auth</title>
  </head>
  <body>
    <div id="error-log" style="color: red; padding: 20px; font-family: monospace; white-space: pre-wrap;"></div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('error-log').textContent += msg + '\\n' + (error && error.stack ? error.stack : '') + '\\n';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-log').textContent += 'Unhandled promise rejection: ' + event.reason + '\\n';
      });
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
